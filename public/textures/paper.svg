<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="paper">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" />
    <feColorMatrix type="saturate" values="0" />
    <!-- compress the noise into a bright, narrow range so it reads as faint paper grain -->
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.16" intercept="0.84" />
      <feFuncG type="linear" slope="0.16" intercept="0.84" />
      <feFuncB type="linear" slope="0.16" intercept="0.84" />
    </feComponentTransfer>
  </filter>
  <rect width="100%" height="100%" filter="url(#paper)" />
</svg>
